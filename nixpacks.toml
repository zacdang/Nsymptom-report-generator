[phases.setup]
nixPkgs = [
  "nodejs_22", 
  "pnpm",
  "chromium",
  "nss",
  "freetype",
  "harfbuzz",
  "fontconfig",
  "liberation_ttf",
  "wqy_microhei",
  "wqy_zenhei"
]

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm build"]

[start]
cmd = "PUPPETEER_EXECUTABLE_PATH=/nix/store/*-chromium-*/bin/chromium NODE_ENV=production pnpm start"
